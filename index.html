<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyRef — Python Library Reference</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070a0f;--s1:#0d1117;--s2:#111827;--s3:#1a2235;--border:#1e2d45;--border2:#253352;
  --text:#cbd5e1;--text2:#64748b;--text3:#94a3b8;--white:#f1f5f9;
  --accent:#00d4ff;--accent2:#0ea5e9;
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:50px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;flex-shrink:0;z-index:50}
.logo{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:.95rem;color:var(--white);letter-spacing:-0.5px}
.logo em{color:var(--accent);font-style:normal}
.search-wrap{position:relative;margin-left:8px;flex:1;max-width:340px}
.search-wrap input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:6px 12px 6px 30px;color:var(--white);font-size:.8rem;font-family:'Sora',sans-serif;outline:none;transition:border .15s}
.search-wrap input:focus{border-color:var(--accent2)}
.search-wrap input::placeholder{color:var(--text2)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:.8rem;pointer-events:none}
.sdrop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--s2);border:1px solid var(--border2);border-radius:8px;max-height:300px;overflow-y:auto;z-index:200;display:none}
.sdrop.open{display:block}
.si-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:.78rem;border-bottom:1px solid var(--border)}
.si-item:last-child{border-bottom:none}
.si-item:hover{background:rgba(255,255,255,.04)}
.si-lib{font-size:.62rem;padding:2px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;white-space:nowrap;flex-shrink:0}
.si-fn{font-family:'IBM Plex Mono',monospace;color:var(--white)}
.si-desc{color:var(--text2);font-size:.7rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.tbtn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:none;color:var(--text3);font-size:.75rem;font-family:'Sora',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap;margin-left:auto}
.tbtn:hover{border-color:var(--accent);color:var(--accent)}
.tbtn+.tbtn{margin-left:6px}
.tbtn.p{background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.4);color:var(--accent)}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:200px;background:var(--s1);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding-bottom:20px}
.sb-sec{padding:14px 12px 4px;font-size:.58rem;text-transform:uppercase;letter-spacing:2.5px;color:var(--text2);font-weight:600}
.lb{display:flex;align-items:center;gap:7px;width:100%;padding:6px 12px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:.78rem;font-family:'Sora',sans-serif;text-align:left;border-left:2px solid transparent;transition:all .12s}
.lb:hover{background:rgba(255,255,255,.03);color:var(--text3)}
.lb.active{color:var(--white);background:rgba(255,255,255,.05);border-left-color:var(--lc)}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--lc);flex-shrink:0}
.lbadge{margin-left:auto;font-size:.58rem;padding:1px 5px;border-radius:3px;background:rgba(255,255,255,.06);color:var(--text2);font-family:'IBM Plex Mono',monospace}
.fn-list{width:215px;background:var(--s2);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.fl-head{padding:11px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--s2);z-index:10}
.fl-title{font-size:.73rem;font-weight:600;color:var(--white);margin-bottom:6px}
.imp-chip{display:inline-flex;align-items:center;gap:5px;background:var(--s3);border:1px solid var(--border2);border-radius:5px;padding:3px 8px;font-size:.66rem;font-family:'IBM Plex Mono',monospace;color:var(--accent2);cursor:pointer;transition:all .15s}
.imp-chip:hover{border-color:var(--accent);color:var(--accent)}
.fc-label{padding:8px 12px 3px;font-size:.58rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);font-weight:600}
.fi{display:flex;align-items:center;gap:6px;width:100%;padding:5px 12px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:.72rem;font-family:'IBM Plex Mono',monospace;text-align:left;border-left:2px solid transparent;transition:all .12s}
.fi:hover{background:rgba(255,255,255,.03);color:var(--text3)}
.fi.active{color:var(--accent);background:rgba(0,212,255,.06);border-left-color:var(--accent)}
.fdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.content{flex:1;overflow-y:auto;background:var(--bg)}
.ci{max-width:820px;padding:26px 30px;margin:0 auto}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:2rem}
.welcome h2{font-size:1.5rem;font-weight:700;color:var(--white);margin-bottom:.5rem}
.welcome p{color:var(--text2);font-size:.83rem;max-width:400px;line-height:1.7;margin-bottom:2rem}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:580px;width:100%}
.cc{padding:11px;border:1px solid var(--border);border-radius:8px;background:var(--s1);cursor:pointer;transition:all .18s;text-align:left}
.cc:hover{border-color:var(--lc);transform:translateY(-1px)}
.cc-dot{width:7px;height:7px;border-radius:50%;background:var(--lc);margin-bottom:5px}
.cc-name{font-size:.7rem;font-weight:600;color:var(--white)}
.cc-count{font-size:.6rem;color:var(--text2);margin-top:2px}
.loh{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.lo-dot{width:11px;height:11px;border-radius:50%;background:var(--lc)}
.lo-name{font-size:1.25rem;font-weight:700;color:var(--white)}
.lo-desc{color:var(--text3);font-size:.82rem;line-height:1.65;margin-bottom:14px}
.imp-block{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-family:'IBM Plex Mono',monospace;font-size:.75rem;line-height:1.85;margin-bottom:18px;overflow-x:auto}
.fn-ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px}
.fov{background:var(--s1);border:1px solid var(--border);border-radius:7px;padding:9px 11px;cursor:pointer;transition:border .15s}
.fov:hover{border-color:var(--lc)}
.fov-cat{font-size:.58rem;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px;font-weight:600}
.fov-fn{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--white);margin-bottom:3px}
.fov-desc{font-size:.66rem;color:var(--text2);line-height:1.4}
.fov-nd{font-size:.63rem;color:var(--text2);font-style:italic}
.ext-link{display:inline-flex;align-items:center;gap:5px;text-decoration:none;padding:5px 11px;border-radius:5px;font-size:.73rem;border:1px solid;transition:all .15s;font-family:'Sora',sans-serif}
.ext-link:hover{opacity:.82;transform:translateY(-1px)}
.ext-link.p{background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.35);color:var(--accent)}
.ext-link.s{background:rgba(255,255,255,.04);border-color:var(--border2);color:var(--text3)}
.breadcrumb{font-size:.68rem;font-family:'IBM Plex Mono',monospace;color:var(--text2);margin-bottom:9px}
.breadcrumb span{color:var(--text3)}
.fn-name{font-family:'IBM Plex Mono',monospace;font-size:1.1rem;color:var(--white);margin-bottom:11px}
.fn-name .lp{color:var(--lc)}
.sig-box{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:11px 14px;margin-bottom:13px;overflow-x:auto}
.sig-box pre{font-family:'IBM Plex Mono',monospace;font-size:.74rem;line-height:1.65;white-space:pre-wrap;word-break:break-all}
.desc-box{background:var(--s2);border-left:3px solid var(--lc);border-radius:0 8px 8px 0;padding:11px 15px;margin-bottom:16px;font-size:.83rem;line-height:1.7;color:var(--text)}
.links-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.sh{font-size:.6rem;text-transform:uppercase;letter-spacing:2.5px;color:var(--text2);font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:8px}
.sh::after{content:'';flex:1;height:1px;background:var(--border)}
.ptbl{width:100%;border-collapse:collapse;font-size:.78rem;margin-bottom:18px}
.ptbl th{text-align:left;padding:6px 9px;color:var(--text2);font-size:.6rem;text-transform:uppercase;letter-spacing:1.5px;border-bottom:1px solid var(--border);font-weight:500}
.ptbl td{padding:7px 9px;border-bottom:1px solid rgba(30,45,69,.5);vertical-align:top;line-height:1.5}
.ptbl tr:last-child td{border-bottom:none}
.pn{font-family:'IBM Plex Mono',monospace;color:var(--accent);font-size:.74rem}
.pt{font-family:'IBM Plex Mono',monospace;color:#f472b6;font-size:.7rem}
.pd2{font-family:'IBM Plex Mono',monospace;color:#86efac;font-size:.7rem}
.pdesc{color:var(--text2);font-size:.76rem}
.req{display:inline-block;font-size:.56rem;padding:1px 5px;border-radius:3px;background:rgba(239,68,68,.15);color:#f87171;margin-left:4px;font-family:'Sora',sans-serif;text-transform:uppercase;letter-spacing:.5px;vertical-align:middle}
.ret-box{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;margin-bottom:18px;font-size:.8rem}
.ret-type{font-family:'IBM Plex Mono',monospace;color:#f472b6;margin-bottom:3px}
.ret-desc{color:var(--text2);line-height:1.6}
.note{display:flex;gap:9px;padding:9px 13px;border-radius:7px;margin-bottom:9px;font-size:.78rem;line-height:1.6}
.ntip{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);color:#6ee7b7}
.nwarn{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:#fcd34d}
.ninfo{background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);color:#7dd3fc}
.code-wrap{background:var(--s1);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:18px}
.code-head{padding:5px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.code-head span{font-size:.66rem;color:var(--text2);font-family:'IBM Plex Mono',monospace}
.copy-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--text2);font-size:.66rem;padding:2px 8px;cursor:pointer;transition:all .15s;font-family:'Sora',sans-serif}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.code-body{padding:13px 15px;font-family:'IBM Plex Mono',monospace;font-size:.74rem;line-height:1.8;overflow-x:auto}
.kw{color:#7dd3fc}.fn{color:#fbbf24}.st{color:#86efac}.nm{color:#f472b6}.cm{color:#374151;font-style:italic}
.np{color:#3b82f6}.pd{color:#f59e0b}.plt{color:#22c55e}.sns{color:#a78bfa}.sp{color:#f87171}.sk{color:#10b981}.px{color:#34d399}
.tabs{display:flex;gap:0;margin-bottom:15px;border-bottom:1px solid var(--border)}
.tab-btn{padding:8px 15px;border:none;background:none;color:var(--text2);font-size:.77rem;font-family:'Sora',sans-serif;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.tab-btn.active{color:var(--white);border-bottom-color:var(--accent)}
.tab-btn:hover{color:var(--text3)}
.tab-p{display:none}
.tab-p.active{display:block}
.notes-area{width:100%;min-height:140px;background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--white);font-family:'Sora',sans-serif;font-size:.8rem;line-height:1.7;resize:vertical;outline:none;transition:border .15s}
.notes-area:focus{border-color:var(--accent2)}
.notes-area::placeholder{color:var(--text2)}
.save-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.save-btn{padding:5px 14px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.35);border-radius:6px;color:var(--accent);font-size:.73rem;font-family:'Sora',sans-serif;cursor:pointer;transition:all .15s}
.save-btn:hover{background:rgba(0,212,255,.2)}
.save-ok{font-size:.7rem;color:#86efac;opacity:0;transition:opacity .3s}
.save-ok.show{opacity:1}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--s2);border:1px solid var(--border2);border-radius:12px;padding:22px;width:90%;max-width:470px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:.95rem;color:var(--white);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.modal h3 button{background:none;border:none;color:var(--text2);font-size:1rem;cursor:pointer}
.modal h3 button:hover{color:var(--white)}
.fl{display:block;font-size:.68rem;color:var(--text3);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.fi2{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:7px;padding:7px 11px;color:var(--white);font-family:'Sora',sans-serif;font-size:.8rem;outline:none;margin-bottom:12px;transition:border .15s}
.fi2:focus{border-color:var(--accent2)}
.fi2::placeholder{color:var(--text2)}
.fta{width:100%;min-height:75px;background:var(--s1);border:1px solid var(--border);border-radius:7px;padding:7px 11px;color:var(--white);font-family:'Sora',sans-serif;font-size:.8rem;outline:none;margin-bottom:12px;resize:vertical;line-height:1.6;transition:border .15s}
.fta:focus{border-color:var(--accent2)}
.fsel{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:7px;padding:7px 11px;color:var(--white);font-family:'Sora',sans-serif;font-size:.8rem;outline:none;margin-bottom:12px;cursor:pointer}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:4px}
.mfb{padding:6px 14px;border-radius:6px;font-size:.76rem;font-family:'Sora',sans-serif;cursor:pointer;transition:all .15s}
.mfb.c{background:none;border:1px solid var(--border);color:var(--text2)}
.mfb.c:hover{border-color:var(--text2);color:var(--white)}
.mfb.o{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.4);color:var(--accent)}
.mfb.o:hover{background:rgba(0,212,255,.2)}
.imp-code{background:var(--s1);border-radius:8px;padding:11px 13px;font-family:'IBM Plex Mono',monospace;font-size:.76rem;line-height:1.85}
.nd-box{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:18px;text-align:center;margin-bottom:18px}
.nd-box p{color:var(--text2);font-size:.8rem;margin-bottom:11px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">Py<em>Ref</em></div>
  <div class="search-wrap" id="sWrap">
    <span class="si">⌕</span>
    <input type="text" id="sIn" placeholder="Search libraries &amp; functions…">
    <div class="sdrop" id="sDrop"></div>
  </div>
  <button class="tbtn p" onclick="openAddFn()">＋ Add Function</button>
  <button class="tbtn" onclick="openAddLib()">＋ Add Library</button>
</div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="fn-list" id="fnList"><div style="display:flex;align-items:center;justify-content:center;height:100%;padding:2rem;text-align:center"><p style="color:var(--text2);font-size:.76rem;line-height:1.6">Pick a library from the left</p></div></div>
  <main class="content" id="content">
    <div class="welcome">
      <h2>Python Library Reference</h2>
      <p>35+ libraries · 12 categories · inline docs, code examples, and personal notes for every function.</p>
      <div class="cat-grid" id="catGrid"></div>
    </div>
  </main>
</div>

<!-- IMPORT MODAL -->
<div class="overlay" id="impOv" onclick="if(event.target===this)closeImp()">
  <div class="modal">
    <h3 id="impTitle">Import <button onclick="closeImp()">✕</button></h3>
    <div class="imp-code" id="impCode"></div>
    <div class="mf"><button class="mfb c" onclick="closeImp()">Close</button></div>
  </div>
</div>

<!-- ADD LIBRARY -->
<div class="overlay" id="addLibOv" onclick="if(event.target===this)closeAddLib()">
  <div class="modal">
    <h3>Add Library <button onclick="closeAddLib()">✕</button></h3>
    <label class="fl">Library Name</label><input class="fi2" id="nlName" placeholder="e.g. Polars">
    <label class="fl">Category</label>
    <select class="fsel" id="nlCat">
      <option value="analysis">Data Analysis</option><option value="viz">Visualization</option>
      <option value="ml">Machine Learning</option><option value="ts">Forecasting &amp; Time Series</option>
      <option value="dl">Deep Learning &amp; AI</option><option value="sc">Supply Chain / Optimization</option>
      <option value="dash">Dashboard &amp; Web App</option><option value="db">Database &amp; Big Data</option>
      <option value="nlp">NLP / Text Analytics</option><option value="cv">Computer Vision</option>
      <option value="auto">Automation &amp; Scraping</option><option value="stat">Statistical</option>
    </select>
    <label class="fl">Description</label><input class="fi2" id="nlDesc" placeholder="Short description…">
    <label class="fl">Import Statements</label><textarea class="fta" id="nlImps" placeholder="import polars as pl"></textarea>
    <label class="fl">Docs URL</label><input class="fi2" id="nlUrl" placeholder="https://…">
    <div class="mf"><button class="mfb c" onclick="closeAddLib()">Cancel</button><button class="mfb o" onclick="submitAddLib()">Add Library</button></div>
  </div>
</div>

<!-- ADD FUNCTION -->
<div class="overlay" id="addFnOv" onclick="if(event.target===this)closeAddFn()">
  <div class="modal">
    <h3>Add Function <button onclick="closeAddFn()">✕</button></h3>
    <label class="fl">Library</label><select class="fsel" id="nfLib"></select>
    <label class="fl">Category (within library)</label><input class="fi2" id="nfCat" placeholder="e.g. Array Creation">
    <label class="fl">Function Name</label><input class="fi2" id="nfName" placeholder="e.g. np.zeros_like">
    <label class="fl">Signature</label><input class="fi2" id="nfSig" placeholder="np.zeros_like(a, dtype=None)">
    <label class="fl">Description</label><textarea class="fta" id="nfDesc" placeholder="What does this function do?"></textarea>
    <label class="fl">Code Example</label><textarea class="fta" id="nfCode" placeholder="result = np.zeros_like(arr)"></textarea>
    <label class="fl">Doc URL</label><input class="fi2" id="nfUrl" placeholder="https://numpy.org/doc/…">
    <div class="mf"><button class="mfb c" onclick="closeAddFn()">Cancel</button><button class="mfb o" onclick="submitAddFn()">Add Function</button></div>
  </div>
</div>

<script>
const CATS={analysis:{label:'Data Analysis',color:'#3b82f6'},viz:{label:'Visualization',color:'#8b5cf6'},ml:{label:'Machine Learning',color:'#10b981'},ts:{label:'Forecasting & Time Series',color:'#f59e0b'},dl:{label:'Deep Learning & AI',color:'#ef4444'},sc:{label:'Supply Chain',color:'#06b6d4'},dash:{label:'Dashboard & Web App',color:'#a78bfa'},db:{label:'Database & Big Data',color:'#6366f1'},nlp:{label:'NLP / Text',color:'#ec4899'},cv:{label:'Computer Vision',color:'#f97316'},auto:{label:'Automation & Scraping',color:'#84cc16'},stat:{label:'Statistical',color:'#14b8a6'}};

'px.scatter':{sig:`plotly.express.scatter(data_frame=None, x=None, y=None, color=None, size=None, hover_data=None, trendline=None, facet_col=None, title=None, template=None)`,desc:'Interactive scatter plot. Fully interactive — zoom, pan, hover, legend-toggle — no extra code.',params:[{name:'data_frame',type:'DataFrame',req:true,desc:'Source DataFrame.'},{name:'x / y',type:'str',req:true,desc:'Column names for axes.'},{name:'color',type:'str',default:'None',desc:'Column for coloring points.'},{name:'size',type:'str',default:'None',desc:'Column for marker size.'},{name:'trendline',type:'str',default:'None',desc:"'ols','lowess','expanding' regression lines."},{name:'template',type:'str',default:'None',desc:"Theme: 'plotly_dark','ggplot2','simple_white'."}],returns:{type:'Figure',desc:'Interactive Plotly Figure.'},example:`fig = px.<span class="fn">scatter</span>(df, x=<span class="st">'price'</span>, y=<span class="st">'sales'</span>,\n    color=<span class="st">'region'</span>, size=<span class="st">'qty'</span>,\n    trendline=<span class="st">'ols'</span>, template=<span class="st">'plotly_dark'</span>)\nfig.<span class="fn">show</span>()\nfig.<span class="fn">write_html</span>(<span class="st">'chart.html'</span>)`,notes:[{type:'tip',text:"Use template='plotly_dark' for dark-themed dashboards."}],docUrl:'https://plotly.com/python-api-reference/generated/plotly.express.scatter.html'}
};

let CL=null,CF=null;
const NK='pyref_notes_',CLK='pyref_custom_libs',CFN='pyref_custom_fns';

function load(){
  try{Object.assign(LIBS,JSON.parse(localStorage.getItem(CLK)||'{}'));Object.assign(FUNCTIONS,JSON.parse(localStorage.getItem(CFN)||'{}'));}catch(e){}
}
function saveCL(){const o={};Object.keys(LIBS).forEach(k=>{if(LIBS[k]._custom)o[k]=LIBS[k];});localStorage.setItem(CLK,JSON.stringify(o));}
function saveCF(){const o={};Object.keys(FUNCTIONS).forEach(k=>{if(FUNCTIONS[k]._custom)o[k]=FUNCTIONS[k];});localStorage.setItem(CFN,JSON.stringify(o));}

function renderSidebar(){
  const g={};Object.entries(LIBS).forEach(([id,l])=>{if(!g[l.cat])g[l.cat]=[];g[l.cat].push({id,...l});});
  let h='';
  Object.entries(CATS).forEach(([cid,c])=>{
    if(!g[cid])return;
    h+=`<div class="sb-sec">${c.label}</div>`;
    g[cid].forEach(l=>{
      const cnt=Object.values(l.cats||{}).flat().length;
      h+=`<button class="lb ${CL===l.id?'active':''}" style="--lc:${l.color}" onclick="selLib('${l.id}')"><div class="ldot"></div>${l.name}<span class="lbadge">${cnt}</span></button>`;
    });
  });
  document.getElementById('sidebar').innerHTML=h;
}

function renderCatGrid(){
  const el=document.getElementById('catGrid');if(!el)return;
  const cnt={};Object.values(LIBS).forEach(l=>cnt[l.cat]=(cnt[l.cat]||0)+1);
  el.innerHTML=Object.entries(CATS).filter(([id])=>cnt[id]).map(([id,c])=>`<div class="cc" style="--lc:${c.color}" onclick="selFirstLib('${id}')"><div class="cc-dot"></div><div class="cc-name">${c.label}</div><div class="cc-count">${cnt[id]} lib${cnt[id]>1?'raries':'rary'}</div></div>`).join('');
}

function selFirstLib(cid){const e=Object.entries(LIBS).find(([,l])=>l.cat===cid);if(e)selLib(e[0]);}

function selLib(id){
  CL=id;CF=null;
  renderSidebar();renderFnList(id);renderLibOv(id);
}

function renderFnList(id){
  const l=LIBS[id];if(!l)return;
  const clr=l.color;
  let h=`<div class="fl-head"><div class="fl-title" style="color:${clr}">${l.name}</div><div class="imp-chip" onclick="showImp('${id}')">↓ import</div></div>`;
  Object.entries(l.cats||{}).forEach(([cat,fns])=>{
    h+=`<div class="fc-label">${cat}</div>`;
    fns.forEach(fn=>{
      const has=!!FUNCTIONS[fn];
      h+=`<button class="fi ${CF===fn?'active':''}" data-fn="${fn}" onclick="selFn('${fn}')"><div class="fdot" style="background:${has?'#86efac':'#1e2d45'}" title="${has?'Documented':'No inline doc'}"></div>${fn}</button>`;
    });
  });
  document.getElementById('fnList').innerHTML=h;
}

function renderLibOv(id){
  const l=LIBS[id];const clr=l.color;
  const dc=Object.values(l.cats||{}).flat().filter(f=>FUNCTIONS[f]).length;
  const tc=Object.values(l.cats||{}).flat().length;
  let cards='';
  Object.entries(l.cats||{}).forEach(([cat,fns])=>{
    cards+=`<div class="fov" style="border-color:var(--border)" onmouseover="this.style.borderColor='${clr}'" onmouseout="this.style.borderColor='var(--border)'"><div class="fov-cat" style="color:${clr}">${cat}</div>`;
    fns.forEach(fn=>{
      const d=FUNCTIONS[fn];
      cards+=`<div style="display:flex;align-items:flex-start;gap:5px;padding:3px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="selFn('${fn}')"><div class="fdot" style="background:${d?'#86efac':'#1e2d45'};margin-top:5px;flex-shrink:0;width:5px;height:5px;border-radius:50%"></div><div><div class="fov-fn">${fn}</div>${d?`<div class="fov-desc">${d.desc.slice(0,60)}…</div>`:`<div class="fov-nd">Click → external docs</div>`}</div></div>`;
    });
    cards+='</div>';
  });
  document.getElementById('content').innerHTML=`<div class="ci">
    <div class="loh">
      <div class="lo-dot" style="background:${clr}"></div>
      <div class="lo-name">${l.name}</div>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        <span style="font-size:.68rem;color:var(--text2);background:var(--s3);padding:3px 9px;border-radius:4px">${dc}/${tc} documented</span>
        <a href="${l.docs}" target="_blank" class="ext-link p">Official Docs ↗</a>
      </div>
    </div>
    <div class="lo-desc">${l.desc}</div>
    <div class="imp-block">${l.imports.map(i=>i.startsWith('#')?`<span class="cm">${i}</span>`:i.replace(/\bimport\b/g,'<span class="kw">import</span>').replace(/\bfrom\b/g,'<span class="kw">from</span>')).join('<br>')}</div>
    <div class="sh">All Functions</div>
    <div class="fn-ov-grid">${cards}</div>
    <div style="height:40px"></div>
  </div>`;
}

function selFn(fn){
  CF=fn;renderFnList(CL);
  const d=FUNCTIONS[fn];
  const l=LIBS[CL];
  const clr=l?l.color:'#00d4ff';
  const nk=NK+fn.replace(/[^a-z0-9]/gi,'_');
  const note=localStorage.getItem(nk)||'';
  const parts=fn.split('.');const lp=parts.slice(0,-1).join('.');const np=parts[parts.length-1];

  if(!d){
    document.getElementById('content').innerHTML=`<div class="ci">
      <div class="breadcrumb"><span>${l?l.name:CL}</span> › ${fn}</div>
      <div class="fn-name" style="color:var(--text3)">${fn}</div>
      <div class="tabs"><button class="tab-btn active" onclick="swTab(this,'docs')">Documentation</button><button class="tab-btn" onclick="swTab(this,'notes')">My Notes</button></div>
      <div class="tab-p active" id="tab-docs">
        <div class="nd-box"><p>Inline docs not yet available for <code style="font-family:'IBM Plex Mono',monospace;color:${clr}">${fn}</code>. Visit official docs.</p><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><a href="${l?l.docs:'#'}" target="_blank" class="ext-link p">Official ${l?l.name:''} Docs ↗</a><a href="https://stackoverflow.com/search?q=${encodeURIComponent(fn+' python')}" target="_blank" class="ext-link s">Stack Overflow ↗</a></div></div>
        <button class="save-btn" style="border:1px dashed var(--border2);background:none;color:var(--text2)" onclick="openAddFnFor('${fn}')">+ Add documentation for this function</button>
      </div>
      <div class="tab-p" id="tab-notes"><p style="color:var(--text2);font-size:.76rem;margin-bottom:10px;line-height:1.6">Add personal notes for <code style="color:${clr};font-family:'IBM Plex Mono',monospace">${fn}</code>.</p><textarea class="notes-area" id="nA" placeholder="Your notes…">${note}</textarea><div class="save-row"><button class="save-btn" onclick="saveNote('${nk}')">Save Note</button><span class="save-ok" id="sOk">✓ Saved</span></div></div>
      <div style="height:40px"></div>
    </div>`;
    return;
  }

  const pHtml=d.params&&d.params.length?`<div class="sh">Parameters</div><table class="ptbl"><thead><tr><th>Parameter</th><th>Type</th><th>Default</th><th>Description</th></tr></thead><tbody>${d.params.map(p=>`<tr><td class="pn">${p.name}${p.req?'<span class="req">required</span>':''}</td><td class="pt">${p.type||'—'}</td><td class="pd2">${p.default||'—'}</td><td class="pdesc">${p.desc}</td></tr>`).join('')}</tbody></table>`:'';
  const rHtml=d.returns?`<div class="sh">Returns</div><div class="ret-box"><div class="ret-type">${d.returns.type}</div><div class="ret-desc">${d.returns.desc}</div></div>`:'';
  const nHtml=(d.notes||[]).length?`<div class="sh">Notes</div>${d.notes.map(n=>`<div class="note ${n.type==='tip'?'ntip':n.type==='warning'?'nwarn':'ninfo'}"><span style="flex-shrink:0">${n.type==='tip'?'💡':n.type==='warning'?'⚠️':'ℹ️'}</span><span>${n.text}</span></div>`).join('')}`:'';
  const eHtml=d.example?`<div class="sh">Code Example</div><div class="code-wrap"><div class="code-head"><span>python</span><button class="copy-btn" onclick="cpCode(this)">Copy</button></div><div class="code-body">${d.example}</div></div>`:'';

  document.getElementById('content').innerHTML=`<div class="ci">
    <div class="breadcrumb"><span>${l?l.name:CL}</span> › ${fn}</div>
    <div class="fn-name"><span class="lp" style="color:${clr}">${lp?lp+'.':''}</span>${np}</div>
    <div class="sig-box"><pre><span style="color:${clr}">${d.sig.split('(')[0]}</span><span style="color:var(--text2)">(${d.sig.split('(').slice(1).join('(')}</span></pre></div>
    <div class="desc-box" style="border-left-color:${clr}">${d.desc}</div>
    <div class="links-row">
      <a href="${d.docUrl}" target="_blank" class="ext-link p">Official Documentation ↗</a>
      <a href="https://stackoverflow.com/search?q=${encodeURIComponent(fn+' python')}" target="_blank" class="ext-link s">Stack Overflow ↗</a>
      <a href="https://github.com/search?q=${encodeURIComponent(fn)}&type=code" target="_blank" class="ext-link s">GitHub Examples ↗</a>
    </div>
    <div class="tabs"><button class="tab-btn active" onclick="swTab(this,'docs')">Documentation</button><button class="tab-btn" onclick="swTab(this,'notes')">✏ My Notes</button></div>
    <div class="tab-p active" id="tab-docs">${pHtml}${rHtml}${nHtml}${eHtml}</div>
    <div class="tab-p" id="tab-notes">
      <p style="color:var(--text2);font-size:.76rem;margin-bottom:10px;line-height:1.6">Personal notes for <code style="color:${clr};font-family:'IBM Plex Mono',monospace">${fn}</code> — saved locally in your browser.</p>
      <textarea class="notes-area" id="nA" placeholder="e.g. 'Use center=0 for correlation matrices', 'Remember random_state=42'…">${note}</textarea>
      <div class="save-row"><button class="save-btn" onclick="saveNote('${nk}')">Save Note</button><span class="save-ok" id="sOk">✓ Saved</span></div>
    </div>
    <div style="height:40px"></div>
  </div>`;
}

function swTab(btn,tab){
  btn.closest('.tabs').querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-p').forEach(p=>p.classList.remove('active'));
  const p=document.getElementById('tab-'+tab);if(p)p.classList.add('active');
}

function saveNote(k){
  const a=document.getElementById('nA');if(!a)return;
  localStorage.setItem(k,a.value);
  const s=document.getElementById('sOk');if(s){s.classList.add('show');setTimeout(()=>s.classList.remove('show'),2000);}
}

function cpCode(btn){
  const b=btn.closest('.code-wrap').querySelector('.code-body');
  navigator.clipboard.writeText(b.innerText).then(()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',2000);});
}

function showImp(id){
  const l=LIBS[id];
  document.getElementById('impTitle').textContent=`Import — ${l.name}`;
  document.getElementById('impCode').innerHTML=l.imports.map(i=>i.startsWith('#')?`<span class="cm">${i}</span>`:i.replace(/\bimport\b/g,'<span class="kw">import</span>').replace(/\bfrom\b/g,'<span class="kw">from</span>')).join('<br>');
  document.getElementById('impOv').classList.add('open');
}
function closeImp(){document.getElementById('impOv').classList.remove('open');}

function openAddLib(){document.getElementById('addLibOv').classList.add('open');}
function closeAddLib(){document.getElementById('addLibOv').classList.remove('open');}
function submitAddLib(){
  const name=document.getElementById('nlName').value.trim();
  const cat=document.getElementById('nlCat').value;
  const desc=document.getElementById('nlDesc').value.trim();
  const imps=document.getElementById('nlImps').value.trim();
  const url=document.getElementById('nlUrl').value.trim();
  if(!name){alert('Library name required.');return;}
  const id=name.toLowerCase().replace(/\s+/g,'_');
  LIBS[id]={name,cat,color:CATS[cat]?.color||'#64748b',desc:desc||'Custom library.',imports:imps?imps.split('\n').filter(Boolean):['import '+id],docs:url||'#',cats:{'Functions':[]},_custom:true};
  saveCL();
  ['nlName','nlDesc','nlImps','nlUrl'].forEach(i=>document.getElementById(i).value='');
  closeAddLib();renderSidebar();renderCatGrid();buildIdx();selLib(id);
}

function openAddFn(){populateSel();document.getElementById('addFnOv').classList.add('open');}
function openAddFnFor(fn){populateSel();document.getElementById('nfName').value=fn;document.getElementById('addFnOv').classList.add('open');}
function closeAddFn(){document.getElementById('addFnOv').classList.remove('open');}
function populateSel(){document.getElementById('nfLib').innerHTML=Object.entries(LIBS).map(([id,l])=>`<option value="${id}" ${id===CL?'selected':''}>${l.name}</option>`).join('');}
function submitAddFn(){
  const lid=document.getElementById('nfLib').value;
  const cat=document.getElementById('nfCat').value.trim()||'Functions';
  const name=document.getElementById('nfName').value.trim();
  const sig=document.getElementById('nfSig').value.trim();
  const desc=document.getElementById('nfDesc').value.trim();
  const code=document.getElementById('nfCode').value.trim();
  const url=document.getElementById('nfUrl').value.trim();
  if(!name){alert('Function name required.');return;}
  FUNCTIONS[name]={sig:sig||name+'()',desc:desc||'No description provided.',params:[],returns:{type:'—',desc:'See official documentation.'},example:code||'# no example provided',docUrl:url||LIBS[lid]?.docs||'#',_custom:true};
  if(!LIBS[lid].cats[cat])LIBS[lid].cats[cat]=[];
  if(!LIBS[lid].cats[cat].includes(name))LIBS[lid].cats[cat].push(name);
  saveCF();
  ['nfCat','nfName','nfSig','nfDesc','nfCode','nfUrl'].forEach(i=>document.getElementById(i).value='');
  closeAddFn();buildIdx();renderFnList(lid);selFn(name);
}

// SEARCH
let IDX=[];
function buildIdx(){
  IDX=[];
  Object.entries(LIBS).forEach(([lid,l])=>{
    Object.values(l.cats||{}).flat().forEach(fn=>{
      IDX.push({fn,lid,lname:l.name,lcolor:l.color,desc:FUNCTIONS[fn]?.desc||''});
    });
  });
}
const sIn=document.getElementById('sIn');
const sDrop=document.getElementById('sDrop');
sIn.addEventListener('input',()=>{
  const q=sIn.value.trim().toLowerCase();
  if(!q){sDrop.classList.remove('open');return;}
  const hits=IDX.filter(i=>i.fn.toLowerCase().includes(q)||i.desc.toLowerCase().includes(q)).slice(0,10);
  if(!hits.length){sDrop.classList.remove('open');return;}
  sDrop.innerHTML=hits.map(h=>`<div class="si-item" onclick="selLib('${h.lid}');selFn('${h.fn}');sIn.value='';sDrop.classList.remove('open')"><span class="si-lib" style="background:${h.lcolor}22;color:${h.lcolor}">${h.lname}</span><span class="si-fn">${h.fn}</span><span class="si-desc">${h.desc.slice(0,45)}</span></div>`).join('');
  sDrop.classList.add('open');
});
document.addEventListener('click',e=>{if(!document.getElementById('sWrap').contains(e.target))sDrop.classList.remove('open');});

load();renderSidebar();renderCatGrid();buildIdx();
</script>
</body>
</html>
